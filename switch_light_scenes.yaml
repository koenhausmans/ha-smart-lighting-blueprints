# Copyright (c) 2026 Koen Hausmans — MIT License
# Source: https://github.com/koenhausmans/ha-smart-lighting-blueprints
blueprint:
  name: Switch Light – Shelly / Hue button, sun-based brightness, scene cycling
  description: >
    Drive light(s) from a physical button instead of motion. A Shelly button's
    single push toggles the lights (on → sun-based brightness, on → off); a
    double push cycles to the next scene in an input_select and activates it,
    and a triple push jumps two scenes forward. A Philips Hue / Zigbee2MQTT
    dimmer is also supported: its ON key turns the lights on at sun-based
    brightness, its OFF key turns them off, and the up / down keys step
    brightness. Turning the lights off always resets the scene input_select back
    to its first option. Brightness on turn-on optionally follows the sun's
    elevation on a sine curve, with separate minimums and low-elevation
    thresholds for morning vs evening and an optional auto-scale of the high
    threshold to today's peak sun.
  domain: automation
  source_url: https://github.com/koenhausmans/ha-smart-lighting-blueprints/blob/master/switch_light_scenes.yaml
  input:
    shelly_device:
      name: Shelly button device (optional)
      description: >
        The Shelly device whose button drives this automation. Leave empty if
        you only use a Hue dimmer. Single push toggles the lights; double /
        triple push cycle scenes.
      default: []
      selector:
        device:
          integration: shelly

    shelly_button:
      name: Shelly button subtype
      description: >
        The push event's button identifier for your Shelly. Single-channel
        devices are usually "button1"; some report "button". Only used when a
        Shelly device is selected above.
      default: "button1"
      selector:
        text: {}

    hue_device:
      name: Hue / Zigbee2MQTT dimmer device (optional)
      description: >
        A Philips Hue (or other Zigbee2MQTT) dimmer exposed over MQTT. Leave
        empty if you only use a Shelly button. ON / OFF keys turn the lights on
        (sun-based) / off; up / down keys step brightness.
      default: []
      selector:
        device:
          integration: mqtt

    lights:
      name: Light(s)
      description: Pick the light ENTITIES to control (not areas/devices).
      selector:
        entity:
          domain: light
          multiple: true

    scene_input_select:
      name: Scene list (input_select)
      description: >
        An input_select whose options are scene entity_ids (e.g.
        scene.bedroom_relax), such as input_select.bedroom_scene_entities. A
        double push selects the next option and activates that scene; a triple
        push advances two; turning the lights off resets it to the first option.
      selector:
        entity:
          domain: input_select

    scene_transition:
      name: Scene transition time (s)
      description: >
        How long lights fade when a scene is activated (double / triple press).
        Set to 0 for an instant switch. Applies to all scene activations.
      default: 1
      selector:
        number: { min: 0, max: 30, step: 0.5, unit_of_measurement: "s", mode: box }

    brightness_step:
      name: Brightness step (%)
      description: How much each Hue up / down key press changes brightness.
      default: 10
      selector:
        number: { min: 1, max: 50, unit_of_measurement: "%", mode: box }

    helper_last_controller_event:
      name: Virtual multi-press helper (input_text, optional)
      description: >
        An input_text helper used to detect double / triple presses on the Hue
        ON key (which has no native multi-press). The automation stores the last
        ON event here as JSON. Use a UNIQUE helper per automation instance.
        Leave empty to disable multi-press — the Hue ON key then fires instantly
        (single press only). Has no effect on the Shelly, which has native
        single / double / triple push.
      default: []
      selector:
        entity:
          domain: input_text

    helper_double_press_delay:
      name: Multi-press max delay (ms)
      description: >
        Maximum gap between Hue ON presses that still counts as the same gesture.
        When the helper above is set, a single and a double ON press act only
        after this delay (a triple acts immediately on the third press). Only
        used when the helper is configured.
      default: 500
      selector:
        number:
          min: 100
          max: 5000
          step: 10
          unit_of_measurement: milliseconds
          mode: box

    dynamic_brightness:
      name: Use sun-based brightness
      description: If off, the fixed brightness below is always used on turn-on.
      default: true
      selector:
        boolean: {}

    brightness_max:
      name: Maximum brightness (%)
      default: 100
      selector:
        number: { min: 1, max: 100, unit_of_measurement: "%", mode: slider }

    brightness_min_morning:
      name: Minimum brightness – morning (sun rising)
      default: 15
      selector:
        number: { min: 1, max: 100, unit_of_measurement: "%", mode: slider }

    brightness_min_evening:
      name: Minimum brightness – evening (sun setting)
      default: 30
      selector:
        number: { min: 1, max: 100, unit_of_measurement: "%", mode: slider }

    elevation_low_morning:
      name: Low sun elevation – morning (sun rising)
      default: 0
      selector:
        number: { min: -18, max: 60, unit_of_measurement: "°", mode: box }

    elevation_low_evening:
      name: Low sun elevation – evening (sun setting)
      default: 0
      selector:
        number: { min: -18, max: 60, unit_of_measurement: "°", mode: box }

    auto_elevation_high:
      name: Auto-scale high threshold to today's peak sun
      description: >
        If ON, the high elevation = today's max sun elevation (solar noon),
        from your latitude and the date. Midday is then full brightness every
        day, so winter days aren't dimmer. The fixed value below is ignored.
        Keep the low thresholds at/below 0 so the span stays valid in winter.
      default: false
      selector:
        boolean: {}

    elevation_high:
      name: High sun elevation (maximum brightness) – fixed
      description: Used only when auto-scaling above is OFF.
      default: 40
      selector:
        number: { min: 1, max: 90, unit_of_measurement: "°", mode: box }

    fixed_brightness:
      name: Fixed brightness (%)
      description: Used only when sun-based brightness is disabled.
      default: 80
      selector:
        number: { min: 1, max: 100, unit_of_measurement: "%", mode: slider }

    brightness_update_interval:
      name: Brightness update frequency
      description: How often to refresh sun-based brightness while lights are on.
      default: "/15"
      selector:
        select:
          options:
            - { label: "Every 5 minutes", value: "/5" }
            - { label: "Every 10 minutes", value: "/10" }
            - { label: "Every 15 minutes", value: "/15" }
            - { label: "Every 30 minutes", value: "/30" }

    last_auto_helper:
      name: Last auto-brightness helper (optional)
      description: >
        An input_number helper (create one per automation instance). The
        automation writes its last automatic brightness here. On a tick it then
        refreshes ONLY lights whose brightness still matches this value (within
        the tolerance below) — so lights you have manually dimmed, and lights set
        by an activated scene, are left alone until the next plain turn-on. Leave
        empty to disable manual-override protection (the tick then refreshes every
        light that is on).
      default: []
      selector:
        entity:
          domain: input_number

    override_tolerance:
      name: Manual-override tolerance (%)
      description: >
        A light counts as manually changed if its brightness differs from the
        stored automatic value by more than this. Lower = stricter.
      default: 3
      selector:
        number: { min: 0, max: 25, unit_of_measurement: "%", mode: box }

mode: parallel
max: 10

variables:
  light_entities: !input lights
  scene_select: !input scene_input_select
  scene_transition: !input scene_transition
  step: !input brightness_step
  evt_helper: !input helper_last_controller_event
  dp_delay: !input helper_double_press_delay
  # Virtual multi-press is enabled only when an input_text helper is configured.
  dp_enabled: "{{ (evt_helper is string) and (evt_helper | length > 0) }}"
  # Press count for THIS ON press. Self-contained (references only the !input
  # vars, per the AGENTS.md evaluation-order rule): parse the PREVIOUS ON event
  # from the helper, and increment the streak when it landed within the delay
  # window, else start a fresh single. Capped at 3 (triple). Guarded so an
  # empty / non-JSON helper can't raise.
  on_count: >-
    {% set v = states(evt_helper) if (evt_helper is string and evt_helper | length > 0) else '' %}
    {% set p = (v | from_json) if (v is string and v.startswith('{')) else {} %}
    {% set delta_ms = (as_timestamp(now()) - (p.t | default(0) | float(0))) * 1000 %}
    {% if p.a | default('') == 'on_press' and (delta_ms | int) <= (dp_delay | int) %}
      {{ [ (p.n | default(0) | int) + 1, 3] | min }}
    {% else %}
      1
    {% endif %}
  b_max: !input brightness_max
  b_min_morning: !input brightness_min_morning
  b_min_evening: !input brightness_min_evening
  use_dynamic: !input dynamic_brightness
  fixed_b: !input fixed_brightness
  elev_low_morning: !input elevation_low_morning
  elev_low_evening: !input elevation_low_evening
  auto_high: !input auto_elevation_high
  elev_high_fixed: !input elevation_high
  helper: !input last_auto_helper
  override_tol: !input override_tolerance
  target_brightness: >
    {% if use_dynamic %}
      {% set elevation = state_attr('sun.sun', 'elevation') | float(-90) %}
      {% set rising = state_attr('sun.sun', 'rising') %}
      {% set b_min   = b_min_morning   if rising else b_min_evening %}
      {% set elev_low = elev_low_morning if rising else elev_low_evening %}
      {% if auto_high %}
        {% set lat = state_attr('zone.home', 'latitude') | float(45) %}
        {% set doy = now().strftime('%j') | int %}
        {% set decl = -23.45 * cos( (360 / 365 * (doy + 10)) * pi / 180 ) %}
        {% set elev_high = 90 - ((lat - decl) | abs) %}
      {% else %}
        {% set elev_high = elev_high_fixed %}
      {% endif %}
      {% set span = elev_high - elev_low %}
      {% set frac = ((elevation - elev_low) / span) if span > 0 else 0 %}
      {% set frac = [[frac, 0] | max, 1] | min %}
      {% set factor = (1 - cos(frac * pi)) / 2 %}
      {% set b = b_min + (b_max - b_min) * factor %}
      {{ [[b | round(0) | int, 1] | max, 100] | min }}
    {% else %}
      {{ fixed_b }}
    {% endif %}
  # Lights to refresh on a tick: currently ON, and (if a helper is configured)
  # still at the last automatic value (i.e. not manually dimmed or scene-set).
  tick_targets: >
    {% set helper_set = (helper is string) and (helper | length > 0) %}
    {% set stored = states(helper) | float(-999) if helper_set else -999 %}
    {% set ns = namespace(t=[]) %}
    {% for e in light_entities %}
      {% if is_state(e, 'on') %}
        {% if not helper_set %}
          {% set ns.t = ns.t + [e] %}
        {% else %}
          {% set cur = (state_attr(e, 'brightness') | float(0)) / 255 * 100 %}
          {% if ((cur - stored) | abs) <= override_tol %}
            {% set ns.t = ns.t + [e] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.t }}

trigger:
  # Shelly single push: toggle the lights.
  - platform: device
    domain: shelly
    device_id: !input shelly_device
    type: single_push
    subtype: !input shelly_button
    id: toggle

  # Shelly double push: next scene.
  - platform: device
    domain: shelly
    device_id: !input shelly_device
    type: double_push
    subtype: !input shelly_button
    id: scene_next

  # Shelly triple push: two scenes forward.
  - platform: device
    domain: shelly
    device_id: !input shelly_device
    type: triple_push
    subtype: !input shelly_button
    id: scene_next2

  # Hue ON key: force on at sun-based brightness.
  - platform: device
    domain: mqtt
    device_id: !input hue_device
    type: action
    subtype: on_press
    id: light_on

  # Hue OFF key: force off.
  - platform: device
    domain: mqtt
    device_id: !input hue_device
    type: action
    subtype: off_press
    id: light_off

  # Hue brightness-up key.
  - platform: device
    domain: mqtt
    device_id: !input hue_device
    type: action
    subtype: up_press
    id: bright_up

  # Hue brightness-down key.
  - platform: device
    domain: mqtt
    device_id: !input hue_device
    type: action
    subtype: down_press
    id: bright_down

  # Time-pattern tick: refresh sun-based brightness on occupied, non-overridden lights.
  - platform: time_pattern
    minutes: !input brightness_update_interval
    id: tick

action:
  - choose:
      # Shelly single push: if any light is on, turn all off and reset the scene
      # list to its first option; otherwise turn all on at target brightness.
      - conditions:
          - condition: trigger
            id: toggle
        sequence:
          - if:
              - "{{ expand(light_entities) | selectattr('state','eq','on') | list | count > 0 }}"
            then:
              - service: light.turn_off
                target:
                  entity_id: !input lights
                data:
                  transition: 1
              - service: input_select.select_first
                target:
                  entity_id: !input scene_input_select
            else:
              - service: light.turn_on
                target:
                  entity_id: !input lights
                data:
                  brightness_pct: "{{ target_brightness }}"
              - if:
                  - "{{ (helper is string) and (helper | length > 0) }}"
                then:
                  - service: input_number.set_value
                    target:
                      entity_id: !input last_auto_helper
                    data:
                      value: "{{ target_brightness }}"

      # Hue ON key: virtual single / double / triple press.
      #   - helper not configured  → turn on at target brightness immediately.
      #   - configured             → count presses (see variables.on_count):
      #       triple (3) fires immediately (two scenes forward);
      #       single (1) / double (2) act after the delay, but only if no later
      #       press has overwritten the helper (post-delay re-check).
      - conditions:
          - condition: trigger
            id: light_on
        sequence:
          - if:
              - "{{ not dp_enabled }}"
            then:
              - service: light.turn_on
                target:
                  entity_id: !input lights
                data:
                  brightness_pct: "{{ target_brightness }}"
              - if:
                  - "{{ (helper is string) and (helper | length > 0) }}"
                then:
                  - service: input_number.set_value
                    target:
                      entity_id: !input last_auto_helper
                    data:
                      value: "{{ target_brightness }}"
            else:
              - variables:
                  this_ts: "{{ as_timestamp(now()) }}"
              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_controller_event
                data:
                  value: '{{ {"a": "on_press", "n": on_count | int, "t": this_ts} | to_json }}'
              - if:
                  - "{{ on_count | int >= 3 }}"
                then:
                  # Triple: two scenes forward, activate. Terminal gesture — act now.
                  - service: input_select.select_next
                    target:
                      entity_id: !input scene_input_select
                  - service: input_select.select_next
                    target:
                      entity_id: !input scene_input_select
                  - service: scene.turn_on
                    target:
                      entity_id: "{{ states(scene_select) }}"
                    data:
                      transition: "{{ scene_transition }}"
                  - if:
                      - "{{ (helper is string) and (helper | length > 0) }}"
                    then:
                      - service: input_number.set_value
                        target:
                          entity_id: !input last_auto_helper
                        data:
                          value: -999
                else:
                  # Single / double: wait, then only act if still the latest press.
                  - delay:
                      milliseconds: "{{ dp_delay | int }}"
                  - condition: template
                    value_template: >
                      {{ (states(evt_helper) | from_json).t | float(0) == this_ts }}
                  - if:
                      - "{{ on_count | int == 2 }}"
                    then:
                      # Double: one scene forward, activate.
                      - service: input_select.select_next
                        target:
                          entity_id: !input scene_input_select
                      - service: scene.turn_on
                        target:
                          entity_id: "{{ states(scene_select) }}"
                        data:
                          transition: "{{ scene_transition }}"
                      - if:
                          - "{{ (helper is string) and (helper | length > 0) }}"
                        then:
                          - service: input_number.set_value
                            target:
                              entity_id: !input last_auto_helper
                            data:
                              value: -999
                    else:
                      # Single: turn on at target brightness.
                      - service: light.turn_on
                        target:
                          entity_id: !input lights
                        data:
                          brightness_pct: "{{ target_brightness }}"
                      - if:
                          - "{{ (helper is string) and (helper | length > 0) }}"
                        then:
                          - service: input_number.set_value
                            target:
                              entity_id: !input last_auto_helper
                            data:
                              value: "{{ target_brightness }}"

      # Hue OFF key: turn all off and reset the scene list to its first option.
      - conditions:
          - condition: trigger
            id: light_off
        sequence:
          # Invalidate any pending ON single/double run (post-delay re-check fails).
          - if:
              - "{{ dp_enabled }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_controller_event
                data:
                  value: '{{ {"a": "off_press", "t": as_timestamp(now())} | to_json }}'
          - service: light.turn_off
            target:
              entity_id: !input lights
            data:
              transition: 1
          - service: input_select.select_first
            target:
              entity_id: !input scene_input_select

      # Shelly double push: advance to the next scene and activate it.
      - conditions:
          - condition: trigger
            id: scene_next
        sequence:
          - service: input_select.select_next
            target:
              entity_id: !input scene_input_select
          - service: scene.turn_on
            target:
              entity_id: "{{ states(scene_select) }}"
            data:
              transition: "{{ scene_transition }}"
          - if:
              - "{{ (helper is string) and (helper | length > 0) }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: !input last_auto_helper
                data:
                  value: -999

      # Shelly triple push: advance two scenes and activate the result.
      - conditions:
          - condition: trigger
            id: scene_next2
        sequence:
          - service: input_select.select_next
            target:
              entity_id: !input scene_input_select
          - service: input_select.select_next
            target:
              entity_id: !input scene_input_select
          - service: scene.turn_on
            target:
              entity_id: "{{ states(scene_select) }}"
            data:
              transition: "{{ scene_transition }}"
          - if:
              - "{{ (helper is string) and (helper | length > 0) }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: !input last_auto_helper
                data:
                  value: -999

      # Hue brightness-up key: step current brightness up.
      - conditions:
          - condition: trigger
            id: bright_up
        sequence:
          - if:
              - "{{ dp_enabled }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_controller_event
                data:
                  value: '{{ {"a": "up_press", "t": as_timestamp(now())} | to_json }}'
          - service: light.turn_on
            target:
              entity_id: !input lights
            data:
              brightness_step_pct: "{{ step }}"
              transition: 1

      # Hue brightness-down key: step current brightness down.
      - conditions:
          - condition: trigger
            id: bright_down
        sequence:
          - if:
              - "{{ dp_enabled }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_controller_event
                data:
                  value: '{{ {"a": "down_press", "t": as_timestamp(now())} | to_json }}'
          - service: light.turn_on
            target:
              entity_id: !input lights
            data:
              brightness_step_pct: "{{ -step }}"
              transition: 1

      # Tick: refresh brightness on the eligible lights only (never scenes/manual dims).
      - conditions:
          - condition: trigger
            id: tick
          - "{{ use_dynamic }}"
          - "{{ tick_targets | count > 0 }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: "{{ tick_targets }}"
            data:
              brightness_pct: "{{ target_brightness }}"
              transition: 2
          - if:
              - "{{ (helper is string) and (helper | length > 0) }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: !input last_auto_helper
                data:
                  value: "{{ target_brightness }}"
